<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.2" />
    </filter>
  </defs>
  <g transform="translate(50, 50) scale(1.13636) translate(-50, -50)">
  <!-- 极客终端窗口 (正方形结构) -->
  <rect x="6" y="6" width="88" height="88" rx="20" fill="#1e293b" filter="url(#shadow)" />

  <!-- Mac 风格的窗口红黄绿小圆点 -->
  <circle cx="20" cy="20" r="4.5" fill="#ff5f56" />
  <circle cx="34" cy="20" r="4.5" fill="#ffbd2e" />
  <circle cx="48" cy="20" r="4.5" fill="#27c93f" />

  <!-- 窗口标题栏分割线 -->
  <line x1="6" y1="34" x2="94" y2="34" stroke="#334155" stroke-width="2.5" />

  <!-- IT 极客提示符 ">" -->
  <path d="M 22 53 L 32 61 L 22 69" fill="none" stroke="#ff99cc" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />

  <!-- 心情记录笑脸 ":)" -->
  <!-- 眼睛 -->
  <circle cx="53" cy="52.5" r="4.5" fill="#f8fafc" />
  <circle cx="69" cy="52.5" r="4.5" fill="#f8fafc" />

  <!-- 脸颊红晕 -->
  <circle cx="44" cy="61" r="3.5" fill="#ff758c" opacity="0.9" />
  <circle cx="78" cy="61" r="3.5" fill="#ff758c" opacity="0.9" />

  <!-- 扬起的嘴角 -->
  <path d="M 52 68 Q 61 77 70 68" fill="none" stroke="#f8fafc" stroke-width="6" stroke-linecap="round" />
  </g>
</svg>
